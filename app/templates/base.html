<!DOCTYPE html>
<html lang="{{ get_locale() }}" dir="{{ 'rtl' if get_locale() == 'ar' else 'ltr' }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <title>{% block title %}{{ _('Rays Machad') }}{% endblock %}</title>

    <!-- Favicon -->

    <link rel="icon" href="{{ url_for('static', filename='machad_logo.png') }}" type="image/png">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='rays_pwa_logo.png') }}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rays Machad">


    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />

    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        :root {
            --font-en: 'Inter', sans-serif;
            --font-ar: 'Cairo', sans-serif;
        }

        [dir="rtl"] body {
            font-family: var(--font-ar);
        }

        [dir="ltr"] body {
            font-family: var(--font-en);
        }
    </style>
    <!-- Core JS -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DataTables JS & Buttons -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.colVis.min.js"></script>

    <!-- Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script id="datatables-translations" type="application/json">
        {{
            {
                "search": _('Search:'),
                "lengthMenu": _('Show _MENU_ entries'),
                "info": _('Showing <b>_START_</b> to <b>_END_</b> of <b>_TOTAL_</b> entries'),
                "infoEmpty": _('Showing <b>0</b> to <b>0</b> of <b>0</b> entries'),
                "infoFiltered": _('(filtered from <b>_MAX_</b> total entries)'),
                "zeroRecords": _('No matching records found'),
                "emptyTable": _('No data available in table'),
                "paginate": {
                    "first": _('First'),
                    "last": _('Last'),
                    "next": _('Next'),
                    "previous": _('Previous')
                },
                "buttons": {
                    "copy": _('Copy'),
                    "print": _('Print'),
                    "colvis": _('Column Visibility')
                }
            } | tojson | safe
        }}
    </script>
    <script>
        try {
            window.datatables_translations = JSON.parse(document.getElementById('datatables-translations').textContent);
        } catch (e) {
            console.error("DataTables translations failed to parse:", e);
            window.datatables_translations = {};
        }
    </script>
    <script src="{{ url_for('static', filename='js/js.js') }}?v=1.2"></script>
    {% block styles %}{% endblock %}
</head>

<body class="">

    {% block body %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>

</html>
