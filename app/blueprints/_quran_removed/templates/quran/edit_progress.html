{% extends "layout.html" %}

{% block content %}
<div class="container-fluid px-0">
    <!-- Header -->
    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="{{ url_for('quran.student_progress', progress_id=progress.id) }}" class="btn btn-light rounded-3">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div>
            <h3 class="fw-bold mb-0"><i class="fa-solid fa-pen-to-square me-2 text-warning"></i>{{ _('Edit Quran Progress') }}</h3>
            <p class="text-muted small mb-0">{{ _('Update progress for') }} <strong>{{ progress.student.full_name }}</strong></p>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
            <form method="post" action="{{ url_for('quran.edit_progress', progress_id=progress.id) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="row g-3">
                    <!-- Student (Read Only) -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">{{ _('Student') }}</label>
                        <input type="text" class="form-control bg-light" value="{{ progress.student.full_name }}" readonly>
                    </div>

                    <!-- Teacher -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">{{ _('Teacher') }}</label>
                        <select name="teacher_id" class="form-select">
                            <option value="">{{ _('Select teacher...') }}</option>
                            {% for t in teachers %}
                            <option value="{{ t.id }}" {{ 'selected' if progress.teacher_id == t.id }}>{{ t.full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Mode -->
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">{{ _('Learning Mode') }} <span class="text-danger">*</span></label>
                        <select name="mode" class="form-select" required>
                            <option value="Nazira" {{ 'selected' if progress.mode == 'Nazira' }}>Nazira (Recitation)</option>
                            <option value="Hifz" {{ 'selected' if progress.mode == 'Hifz' }}>Hifz (Memorization)</option>
                            <option value="Muraja'a" {{ "selected" if progress.mode == "Muraja'a" }}>Muraja'a (Revision)</option>
                        </select>
                    </div>

                    <!-- Current Juz -->
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">{{ _('Current Juz') }}</label>
                        <select name="current_juz" class="form-select">
                            {% for i in range(1, 31) %}
                            <option value="{{ i }}" {{ 'selected' if progress.current_juz == i }}>{{ _('Juz') }} {{ i }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Current Aya -->
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">{{ _('Current Aya') }}</label>
                        <input type="number" name="current_aya" class="form-control" min="1" value="{{ progress.current_aya }}">
                    </div>

                    <!-- Current Surah -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">{{ _('Current Surah') }}</label>
                        <select name="current_surah" class="form-select" id="surah_select" onchange="updateSurahNumber(this)">
                            {% for num, name in SURAHS %}
                            <option value="{{ name }}" data-num="{{ num }}" {{ 'selected' if progress.current_surah == name }}>{{ num }}. {{ name }}</option>
                            {% endfor %}
                        </select>
                        <input type="hidden" name="current_surah_number" id="surah_number" value="{{ progress.current_surah_number }}">
                    </div>

                    <!-- Pages memorized -->
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">{{ _('Pages Memorized') }}</label>
                        <input type="number" name="total_pages_memorized" class="form-control" min="0" max="604" value="{{ progress.total_pages_memorized }}">
                        <small class="text-muted">{{ _('Out of 604 pages') }}</small>
                    </div>

                    <!-- Juz completed -->
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">{{ _('Juz Completed') }}</label>
                        <input type="number" name="total_juz_completed" class="form-control" min="0" max="30" value="{{ progress.total_juz_completed }}">
                        <small class="text-muted">{{ _('Out of 30') }}</small>
                    </div>

                    <!-- Notes -->
                    <div class="col-12">
                        <label class="form-label fw-semibold">{{ _('Notes') }}</label>
                        <textarea name="notes" class="form-control" rows="3">{{ progress.notes }}</textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-warning px-4">
                        <i class="fa-solid fa-save me-2"></i>{{ _('Update Record') }}
                    </button>
                    <a href="{{ url_for('quran.student_progress', progress_id=progress.id) }}" class="btn btn-outline-secondary px-4">{{ _('Cancel') }}</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function updateSurahNumber(sel) {
    document.getElementById('surah_number').value = sel.options[sel.selectedIndex].dataset.num;
}
</script>
{% endblock %}
