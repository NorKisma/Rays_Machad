{% extends "layout.html" %}

{% block content %}
<div class="container-fluid px-0">
    <!-- Header -->
    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="{{ url_for('quran.index') }}" class="btn btn-light rounded-3">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div>
            <h3 class="fw-bold mb-0"><i class="fa-solid fa-book-quran me-2 text-success"></i>{{ _('Add Quran Progress') }}</h3>
            <p class="text-muted small mb-0">{{ _('Register a new student Quran tracking record') }}</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
            <form method="post" action="{{ url_for('quran.add_progress') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="row g-3">
                    <!-- Student -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">{{ _('Student') }} <span class="text-danger">*</span></label>
                        <select name="student_id" class="form-select" required>
                            <option value="">{{ _('Select student...') }}</option>
                            {% for s in students %}
                            <option value="{{ s.id }}">{{ s.full_name }} ({{ s.enrollment_number }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Teacher -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">{{ _('Teacher') }}</label>
                        <select name="teacher_id" class="form-select">
                            <option value="">{{ _('Select teacher...') }}</option>
                            {% for t in teachers %}
                            <option value="{{ t.id }}">{{ t.full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Mode -->
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">{{ _('Learning Mode') }} <span class="text-danger">*</span></label>
                        <select name="mode" class="form-select" required>
                            <option value="Nazira">Nazira (Recitation)</option>
                            <option value="Hifz">Hifz (Memorization)</option>
                            <option value="Muraja'a">Muraja'a (Revision)</option>
                        </select>
                    </div>

                    <!-- Current Juz -->
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">{{ _('Current Juz') }}</label>
                        <select name="current_juz" id="juz_select" class="form-select">
                            {% for i in range(1, 31) %}
                            <option value="{{ i }}">{{ _('Juz') }} {{ i }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Current Aya -->
                    <div class="col-md-4">
                        <label class="form-label fw-semibold text-dark">{{ _('Current Aya') }}</label>
                        <input type="number" name="current_aya" id="aya_input" class="form-control bg-white shadow-sm" min="1" value="1">
                        <small id="aya_hint" class="text-muted"></small>
                    </div>

                    <!-- Current Surah (filtered by Juz above) -->
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">{{ _('Current Surah') }}</label>
                        <select name="current_surah" class="form-select" id="surah_select">
                            <!-- Populated by JavaScript based on selected Juz -->
                        </select>
                        <input type="hidden" name="current_surah_number" id="surah_number" value="1">
                    </div>

                    <!-- Pages memorized -->
                    <div class="col-md-3">
                        <label class="form-label fw-semibold text-dark">{{ _('Pages Memorized') }}</label>
                        <input type="number" name="total_pages_memorized" class="form-control bg-white shadow-sm" min="0" max="604" value="0">
                        <small class="text-muted">{{ _('Out of 604 pages') }}</small>
                    </div>

                    <!-- Juz completed -->
                    <div class="col-md-3">
                        <label class="form-label fw-semibold text-dark">{{ _('Juz Completed') }}</label>
                        <input type="number" name="total_juz_completed" class="form-control bg-white shadow-sm" min="0" max="30" value="0">
                        <small class="text-muted">{{ _('Out of 30') }}</small>
                    </div>

                    <!-- Notes -->
                    <div class="col-12">
                        <label class="form-label fw-semibold text-dark">{{ _('Notes') }}</label>
                        <textarea name="notes" class="form-control bg-white shadow-sm" rows="3" placeholder="{{ _('Any additional notes...') }}"></textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success px-4">
                        <i class="fa-solid fa-save me-2"></i>{{ _('Save Record') }}
                    </button>
                    <a href="{{ url_for('quran.index') }}" class="btn btn-outline-secondary px-4">{{ _('Cancel') }}</a>
                </div>
            </form>
        </div>
    </div>
</div>


<script>

    21: [[33,'Al-Ahzab',73],[34,'Saba',54],[35,'Fatir',45]],

function updateSurahsByJuz() {
    const juzSelect  = document.getElementById('juz_select');
    const surahSelect = document.getElementById('surah_select');
    const ayaInput   = document.getElementById('aya_input');
    const surahNumHidden = document.getElementById('surah_number');

    const juz = parseInt(juzSelect.value);
    const surahs = JUZ_SURAHS[juz] || [];

    // Rebuild surah options
    surahSelect.innerHTML = '';
    surahs.forEach(([num, name, ayahs]) => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.dataset.num  = num;
        opt.dataset.ayahs = ayahs;
        opt.textContent = `${num}. ${name}`;
        surahSelect.appendChild(opt);
    });

    // Trigger surah change
    updateAyahCount();
}

function updateAyahCount() {
    const surahSelect = document.getElementById('surah_select');
    const ayaInput   = document.getElementById('aya_input');
    const surahNumHidden = document.getElementById('surah_number');

    const selected = surahSelect.options[surahSelect.selectedIndex];
    if (!selected) return;

    const maxAyahs = parseInt(selected.dataset.ayahs) || 1;
    surahNumHidden.value = selected.dataset.num;

    ayaInput.max = maxAyahs;
    ayaInput.setAttribute('placeholder', `1 - ${maxAyahs}`);

    // Update the small hint text
    const hint = document.getElementById('aya_hint');
    if (hint) hint.textContent = `Max: ${maxAyahs} ayahs`;

    // Clamp current value
    if (parseInt(ayaInput.value) > maxAyahs) ayaInput.value = maxAyahs;
}

document.addEventListener('DOMContentLoaded', function () {
    // Wire events
    const juzSelect = document.getElementById('juz_select');
    const surahSelect = document.getElementById('surah_select');

    if (juzSelect) juzSelect.addEventListener('change', updateSurahsByJuz);
    if (surahSelect) surahSelect.addEventListener('change', updateAyahCount);

    // Init on page load
    if (juzSelect) updateSurahsByJuz();

    // Select2 init — only on student/teacher dropdowns, NOT juz/surah (we handle those ourselves)
    $('.form-select').not('#juz_select, #surah_select').each(function() {
        if ($(this).find('option').length > 5) {
            $(this).select2({
                theme: 'bootstrap-5',
                width: '100%',
                placeholder: '{{ _("Select or search...") }}'
            });
        }
    });
});
</script>
{% endblock %}
